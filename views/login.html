<!-- Background elements for Login dynamic blur effect -->
<div class="bg-shape bg-shape-1"></div>
<div class="bg-shape bg-shape-2"></div>

<div class="login-wrapper">
    <div class="login-card">
        <div class="login-header">
            <div class="logo-circle">
                <i class='bx bx-football'></i>
            </div>
            <h1>Pitch Pro</h1>
            <p class="subtitle">Panel de Administración</p>
        </div>

        <!-- Error message -->
        <div id="login-error" class="login-error-box" style="display:none;">
            <i class='bx bx-error-circle'></i>
            <span id="login-error-msg">Correo o contraseña incorrectos.</span>
        </div>

        <form id="login-form" autocomplete="off">
            <div class="input-group">
                <label for="email">Correo Electrónico</label>
                <div class="input-wrapper">
                    <i class='bx bx-envelope'></i>
                    <input type="email" id="email" name="email" placeholder="usuario@pitchpro.com" required>
                </div>
            </div>

            <div class="input-group">
                <div class="label-row">
                    <label for="password">Contraseña</label>
                    <a href="#" class="forgot-link">¿Olvidaste tu contraseña?</a>
                </div>
                <div class="input-wrapper">
                    <i class='bx bx-lock-alt'></i>
                    <input type="password" id="password" name="password" placeholder="••••••••" required>
                </div>
            </div>

            <div class="checkbox-group">
                <label class="custom-checkbox">
                    <input type="checkbox" name="remember" id="remember">
                    <span class="checkmark"></span>
                    <span class="cb-text">Recordarme</span>
                </label>
            </div>

            <button type="submit" class="btn btn-primary" id="login-submit-btn">
                Ingresar al Panel <i class='bx bx-right-arrow-alt'></i>
            </button>
        </form>

        <!-- Demo Credentials -->
        <div class="demo-credentials">
            <p class="demo-title"><i class='bx bx-info-circle'></i> Credenciales de Demo</p>
            <div class="demo-cards">
                <div class="demo-card" data-email="superadmin@pitchpro.com" data-pass="super123">
                    <span class="demo-role-badge badge-super">SUPER ADMIN</span>
                    <strong>superadmin@pitchpro.com</strong>
                    <span>super123</span>
                </div>
                <div class="demo-card" data-email="admin@sede1.com" data-pass="admin123">
                    <span class="demo-role-badge badge-admin">ADMIN SEDE</span>
                    <strong>admin@sede1.com</strong>
                    <span>admin123</span>
                </div>
                <div class="demo-card" data-email="recep@sede1.com" data-pass="recep123">
                    <span class="demo-role-badge badge-recep">RECEPCIONISTA</span>
                    <strong>recep@sede1.com</strong>
                    <span>recep123</span>
                </div>
            </div>
        </div>

        <p class="login-footer">
            ¿Necesitas ayuda? <a href="#">Contactar Soporte</a>
        </p>
    </div>
</div>

<style>
    /* Error box */
    .login-error-box {
        display: flex;
        align-items: center;
        gap: 10px;
        background: #fef2f2;
        border: 1px solid #fca5a5;
        border-radius: 12px;
        padding: 12px 16px;
        margin-bottom: 20px;
        color: #dc2626;
        font-size: 13px;
        font-weight: 500;
        animation: shake 0.4s ease;
    }
    .login-error-box i { font-size: 18px; flex-shrink: 0; }
    @keyframes shake {
        0%,100% { transform: translateX(0); }
        20%,60% { transform: translateX(-6px); }
        40%,80% { transform: translateX(6px); }
    }

    /* Demo credentials section */
    .demo-credentials {
        margin-top: 28px;
        border-top: 1px dashed #e2e8f0;
        padding-top: 20px;
    }
    .demo-title {
        font-size: 11px;
        font-weight: 700;
        color: #94a3b8;
        letter-spacing: 1px;
        text-transform: uppercase;
        margin-bottom: 12px;
        display: flex;
        align-items: center;
        gap: 6px;
    }
    .demo-title i { font-size: 14px; }
    .demo-cards {
        display: flex;
        flex-direction: column;
        gap: 8px;
    }
    .demo-card {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 10px 14px;
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 10px;
        cursor: pointer;
        transition: all 0.2s;
        font-size: 12px;
    }
    .demo-card:hover {
        background: #f0fdf4;
        border-color: #86efac;
        transform: translateX(3px);
    }
    .demo-card strong {
        flex: 1;
        color: #334155;
        font-size: 12px;
    }
    .demo-card span:last-child {
        color: #94a3b8;
        font-family: monospace;
        font-size: 12px;
    }
    .demo-role-badge {
        font-size: 9px;
        font-weight: 800;
        letter-spacing: 0.5px;
        padding: 3px 8px;
        border-radius: 20px;
        white-space: nowrap;
        flex-shrink: 0;
    }
    .badge-super  { background: #fef9c3; color: #854d0e; }
    .badge-admin  { background: #dcfce7; color: #166534; }
    .badge-recep  { background: #dbeafe; color: #1d4ed8; }
</style>

<script>
(function () {
    var form    = document.getElementById('login-form');
    var btn     = document.getElementById('login-submit-btn');
    var errBox  = document.getElementById('login-error');
    var errMsg  = document.getElementById('login-error-msg');

    function showError(msg) {
        errMsg.textContent = msg;
        errBox.style.display = 'flex';
        // Re-trigger shake animation
        errBox.style.animation = 'none';
        errBox.offsetHeight; // reflow
        errBox.style.animation = '';
    }

    function hideError() {
        errBox.style.display = 'none';
    }

    form.addEventListener('submit', function (e) {
        e.preventDefault();
        hideError();

        var email = document.getElementById('email').value;
        var pass  = document.getElementById('password').value;

        // Loading state
        btn.innerHTML = "<i class='bx bx-loader-alt bx-spin'></i> Verificando...";
        btn.disabled = true;

        // Simulate slight network delay for realism
        setTimeout(function () {
            var result = window.Auth.login(email, pass);

            if (!result.ok) {
                showError(result.error);
                btn.innerHTML = "Ingresar al Panel <i class='bx bx-right-arrow-alt'></i>";
                btn.disabled = false;
                return;
            }

            // Success
            btn.innerHTML = "<i class='bx bx-check'></i> Acceso concedido";
            btn.style.background = '#16a34a';

            setTimeout(function () {
                window.location.hash = '#/dashboard/inicio';
            }, 500);
        }, 600);
    });

    // Click on demo card fills the form
    document.querySelectorAll('.demo-card').forEach(function (card) {
        card.addEventListener('click', function () {
            document.getElementById('email').value    = card.dataset.email;
            document.getElementById('password').value = card.dataset.pass;
            hideError();
        });
    });
})();
</script>
