openapi: 3.0.3
info:
  title: "API de Usuarios - Management-Sport"
  description: "Documentación de los endpoints para la gestión de Usuarios (operadores del sistema) en Management-Sport."
  version: "1.0.0"
servers:
  - url: http://localhost:8080/api/v1
    description: Servidor de desarrollo local

paths:
  /usuarios:
    get:
      tags:
        - Usuarios
      summary: "Listar usuarios con filtrado por rol"
      description: |
        Obtiene una lista paginada de usuarios. El resultado varía según el rol del usuario autenticado:
        - **SUPERADMIN**: Ve todos los usuarios del sistema.
        - **ADMIN**: Ve únicamente los usuarios de su propia sucursal.
        - **RECEPCIONISTA**: No tiene acceso a este endpoint.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
        - $ref: '#/components/parameters/Sort'
      responses:
        '200':
          description: "Lista de usuarios obtenida con éxito."
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PageableUsuarioResponse'
        '403':
          description: "Acceso denegado."
    post:
      tags:
        - Usuarios
      summary: "Crear un nuevo usuario"
      description: "Registra un nuevo usuario. Un SUPERADMIN puede crear ADMINS y RECEPCIONISTAS. Un ADMIN solo puede crear RECEPCIONISTAS."
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUsuarioRequest'
      responses:
        '201':
          description: "Usuario creado con éxito."
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UsuarioResponse'
        '400':
          description: "Datos de entrada inválidos."
        '403':
          description: "Acceso denegado."

  /usuarios/{id}:
    parameters:
      - $ref: '#/components/parameters/UserId'
    get:
      tags:
        - Usuarios
      summary: "Obtener un usuario por su ID"
      description: "Recupera los detalles de un usuario. Un usuario puede ver su propio perfil. ADMIN/SUPERADMIN pueden ver cualquier perfil."
      security:
        - bearerAuth: []
      responses:
        '200':
          description: "Detalles del usuario."
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UsuarioResponse'
        '403':
          description: "Acceso denegado."
        '404':
          description: "Usuario no encontrado."
    put:
      tags:
        - Usuarios
      summary: "Actualizar datos de un usuario"
      description: "Actualiza datos de un usuario. Un usuario puede actualizar su propio perfil. ADMIN/SUPERADMIN pueden actualizar a otros."
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUsuarioRequest'
      responses:
        '200':
          description: "Usuario actualizado con éxito."
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UsuarioResponse'
        '403':
          description: "Acceso denegado."
        '404':
          description: "Usuario no encontrado."
    delete:
      tags:
        - Usuarios
      summary: "Eliminar un usuario"
      description: "Elimina un usuario por su ID. Solo ADMIN/SUPERADMIN pueden realizar esta acción."
      security:
        - bearerAuth: []
      responses:
        '204':
          description: "Usuario eliminado con éxito."
        '403':
          description: "Acceso denegado."
        '404':
          description: "Usuario no encontrado."

  /usuarios/{id}/password:
    patch:
      tags:
        - Usuarios
      summary: "Cambiar la contraseña de un usuario"
      description: "Permite a un usuario cambiar su propia contraseña. ADMIN/SUPERADMIN también pueden cambiar la de otros."
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/UserId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequest'
      responses:
        '204':
          description: "Contraseña cambiada con éxito."
        '400':
          description: "La contraseña actual es incorrecta."
        '403':
          description: "Acceso denegado."
        '404':
          description: "Usuario no encontrado."

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    UserId:
      name: id
      in: path
      required: true
      description: "ID del usuario a operar."
      schema:
        type: integer
    Page:
      name: page
      in: query
      description: "Número de la página a obtener."
      schema:
        type: integer
        default: 0
    Size:
      name: size
      in: query
      description: "Número de usuarios por página."
      schema:
        type: integer
        default: 10
    Sort:
      name: sort
      in: query
      description: "Criterio de ordenación (ej. 'nombre,asc')."
      schema:
        type: string
  schemas:
    UsuarioResponse:
      type: object
      properties:
        usuarioId: { type: integer, example: 1 }
        empresaId: { type: integer, example: 1 }
        sucursalId: { type: integer, example: 1 }
        username: { type: string, example: "jdoe" }
        nombre: { type: string, example: "John Doe" }
        email: { type: string, example: "john.doe@example.com" }
        rol: { type: string, enum: [SUPERADMIN, ADMIN, RECEPCIONISTA], example: "ADMIN" }
        ultimoLogin: { type: string, format: date-time, example: "2024-04-19T20:00:00Z" }
    CreateUsuarioRequest:
      type: object
      required: [ "username", "nombre", "email", "password", "rol" ]
      properties:
        sucursalId: { type: integer, description: "Requerido si el rol es ADMIN o RECEPCIONISTA.", example: 1 }
        username: { type: string, example: "jdoe" }
        nombre: { type: string, example: "John Doe" }
        email: { type: string, format: email, example: "john.doe@example.com" }
        password: { type: string, format: password, example: "MyS3cur3P@ssw0rd" }
        rol: { type: string, enum: [ADMIN, RECEPCIONISTA], example: "ADMIN" }
    UpdateUsuarioRequest:
      type: object
      properties:
        username: { type: string, example: "john.doe" }
        nombre: { type: string, example: "Johnathan Doe" }
        email: { type: string, format: email, example: "johnathan.d@example.com" }
    ChangePasswordRequest:
      type: object
      required: [ "passwordActual", "passwordNueva" ]
      properties:
        passwordActual: { type: string, format: password, example: "MyS3cur3P@ssw0rd" }
        passwordNueva: { type: string, format: password, example: "MyN3wS3cur3P@ssw0rd" }
    PageableUsuarioResponse:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/UsuarioResponse'
        pageable:
          type: object
          properties:
            pageNumber: { type: integer }
            pageSize: { type: integer }
        totalPages: { type: integer }
        totalElements: { type: integer }
        last: { type: boolean }
        first: { type: boolean }
        numberOfElements: { type: integer }
        empty: { type: boolean }
